<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignTouch - Rejoindre l'événement</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    .code {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 4px;
      background: rgba(16, 185, 129, 0.2);
      padding: 16px 24px;
      border-radius: 12px;
      margin: 20px 0;
      border: 1px solid rgba(16, 185, 129, 0.4);
    }
    .message {
      color: rgba(255,255,255,0.7);
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .store-btn:hover {
      transform: scale(1.02);
    }
    .store-btn.ios {
      background: #000;
      color: #fff;
    }
    .store-btn.android {
      background: #10B981;
      color: #fff;
    }
    .manual-code {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .manual-code p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">✨</div>
    <h1>SignTouch</h1>
    <p class="message">Vous avez été invité à rejoindre un événement SignTouch</p>
    
    <div class="code" id="eventCode">------</div>
    
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <span>Ouverture de l'application...</span>
    </div>
    
    <div id="storeButtons" style="display: none;">
      <p class="message">L'application SignTouch n'est pas installée. Téléchargez-la pour rejoindre l'événement :</p>
      <div class="store-buttons">
        <a href="#" id="iosLink" class="store-btn ios">
          <span>🍎</span> App Store
        </a>
        <a href="#" id="androidLink" class="store-btn android">
          <span>🤖</span> Google Play
        </a>
      </div>
    </div>
    
    <div class="manual-code">
      <p>Ou entrez ce code manuellement dans l'app : <strong id="manualCode">------</strong></p>
    </div>
  </div>

  <script>
    const APP_STORE_URL = 'https://apps.apple.com/app/signtouch/id0000000000';
    const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.signtouch.app';
    
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code') || window.location.pathname.split('/').pop() || '';
    
    document.getElementById('eventCode').textContent = code || '------';
    document.getElementById('manualCode').textContent = code || '------';
    
    const deepLink = `signtouch://join-event?code=${code}`;
    
    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent);
    }
    
    function isAndroid() {
      return /Android/.test(navigator.userAgent);
    }
    
    function showStoreButtons() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('storeButtons').style.display = 'block';
      
      document.getElementById('iosLink').href = APP_STORE_URL;
      document.getElementById('androidLink').href = PLAY_STORE_URL;
    }
    
    function tryOpenApp() {
      const start = Date.now();
      
      window.location.href = deepLink;
      
      setTimeout(function() {
        if (Date.now() - start < 2500) {
          showStoreButtons();
        }
      }, 2000);
    }
    
    if (code) {
      tryOpenApp();
    } else {
      showStoreButtons();
    }
    
    setTimeout(showStoreButtons, 3000);
  </script>
</body>
</html>
